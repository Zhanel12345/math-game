<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Денсаулық мониторингі</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #eef3f7;
    text-align: center;
}

/* Верхняя панель */
.header {
    background: #2f80ed;
    color: white;
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
}

/* Контейнер */
.container {
    max-width: 400px;
    margin: 20px auto;
}

/* Карточки */
.card {
    background: white;
    padding: 15px;
    margin: 15px;
    border-radius: 15px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    text-align: left;
    font-size: 16px;
    line-height: 1.6;
}

/* Скрытая зона */
#secretArea {
    position: fixed;
    top: 0;
    right: 0;
    width: 80px;
    height: 80px;
    opacity: 0;
    z-index: 999;
}
</style>
</head>

<body>

<div class="header">🩺 Денсаулық мониторингі</div>

<div class="container">

    <div class="card">
        ❤️ Жүрек соғу жиілігі: <span id="bpm">72</span> bpm<br>
        🩸 Оттегімен қанығуы (SpO₂): <span id="spo2">97</span> %
    </div>

    <div class="card">
        🌬 Тыныс алу жиілігі: <span id="resp">16</span> /мин<br>
        Түрі: <span id="type">Қалыпты</span>
    </div>

    <div class="card">
        🤧 Жөтел: <span id="cough">Жоқ</span><br>
        🎤 Микрофон деңгейі: <span id="mic">5</span>
    </div>

</div>

<!-- Скрытая область -->
<div id="secretArea"></div>

<script>
// Симуляция данных
setInterval(() => {
    let bpm = Math.floor(65 + Math.random() * 20);
    let spo2 = Math.floor(95 + Math.random() * 4);
    let resp = Math.floor(10 + Math.random() * 10);

    document.getElementById("bpm").innerText = bpm;
    document.getElementById("spo2").innerText = spo2;
    document.getElementById("resp").innerText = resp;

    document.getElementById("type").innerText =
        resp < 12 ? "Баяу" : "Қалыпты";

    document.getElementById("mic").innerText =
        Math.floor(1 + Math.random() * 10);

}, 2000);

// Переключение кашля
function toggleCough() {
    let el = document.getElementById("cough");
    el.innerText = (el.innerText === "Жоқ") ? "Иә" : "Жоқ";
}

// Скрытый клик (правый верхний угол)
document.getElementById("secretArea").addEventListener("click", () => {
    toggleCough();
});
</script>

</body>
</html>
