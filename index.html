<!DOCTYPE html><html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Симуляция датчиков — Алматы</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      padding: 20px;
      margin: 15px auto;
      max-width: 300px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    h1 {
      margin-bottom: 20px;
    }
    .value {
      font-size: 32px;
      font-weight: bold;
    }
    .status-safe {
      color: #00ff88;
      font-weight: bold;
    }
    .status-danger {
      color: red;
      font-weight: bold;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body><h1>🌍 Мониторинг среды (Алматинская область)</h1><div class="card">
  <h2>Температура</h2>
  <div id="temp" class="value">-- °C</div>
</div><div class="card">
  <h2>Влажность</h2>
  <div id="humidity" class="value">-- %</div>
</div><div class="card">
  <h2>Давление</h2>
  <div id="pressure" class="value">-- hPa</div>
</div><div class="card">
  <h2>Огонь в помещении</h2>
  <div id="fire" class="value status-safe">Нет</div>
</div><script>
function random(min, max) {
  return (Math.random() * (max - min) + min).toFixed(1);
}

function updateData() {
  document.getElementById('temp').innerText = random(10, 35) + ' °C';
  document.getElementById('humidity').innerText = random(20, 80) + ' %';
  document.getElementById('pressure').innerText = random(720, 760) + ' hPa';

  const fireChance = Math.random();
  const fireElement = document.getElementById('fire');

  if (fireChance > 0.85) {
    fireElement.innerText = '🔥 ОПАСНО!';
    fireElement.className = 'value status-danger';
  } else {
    fireElement.innerText = 'Нет';
    fireElement.className = 'value status-safe';
  }
}

setInterval(updateData, 2000);
updateData();
</script></body>
                   </html>
